<!DOCTYPE html>
<html lang="ko">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8">
    <title>JIN KIM · JI-IN KIM · POSTSYNTAX Portfolio</title>

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://use.typekit.net/gue2igp.css">
</head>

<body>
    <div class="grid-container">

        <div class="grid-lines-overlay"></div>

        <div class="grid-cell row-1-cell"></div>

        <header class="grid-row row-2">
            <div class="text-cell cell-2-1">graphic designer</div>
            <div class="text-cell cell-2-2">based in seoul, korea >></div>
            <div class="text-cell cell-2-3">and worldwideweb</div>

            <div class="slogan-container col-4" data-col="4">
                <div class="circular-slogan-item" data-word="CAN'T"></div>
                <div class="circular-slogan-item" data-word="STAND"></div>
            </div>

            <div class="slogan-container col-5" data-col="5">
                <div class="circular-slogan-item" data-word="ANY"></div>
                <div class="circular-slogan-item" data-word="STYLE"></div>
            </div>

            <div class="slogan-container col-6" data-col="6">
                <div class="circular-slogan-item" data-word="ALREADY"></div>
                <div class="circular-slogan-item" data-word="EXISTING"></div>
            </div>

            <div class="text-cell cell-2-7 contact-info">
                <a href="mailto:awayfromdiscuss@gmail.com" target="_blank"
                    style=" cursor:pointer;">awayfromdiscuss@gmail.com</a>
                <a href="https://www.instagram.com/post.syntax" target="_blank"
                    style=" cursor:pointer;">instagram *post.syntax*</a>
            </div>

            <div class="text-cell cell-2-8 designer-name">
                jin kim<br>= jiin kim ᘛ⁐̤ᕐᐷ<br>= postsyntax
            </div>

        </header>

        <main class="grid-cell main-content">
            
            <div class="back-shape"><img src="https://github.com/user-attachments/assets/036626b0-c75d-4e45-8915-2d0f5978f64d">
            </div>

            <div class="project-info-container col-1">
                <div class="project-title" id="p-title">No surfing club</div>
            </div>
            <div class="project-info-container col-2">
                <div class="project-category" id="p-category">personal project, SNS</div>
            </div>
            <div class="project-info-container col-3">
                <div class="project-year" id="p-year">2024</div>
            </div>

            <div class="project-description-container">
                <div class="description-text" id="p-description">
                </div>
            </div>

            <div class="img-scroll-wrapper">
                <div class="image-track" id="image-track">
                </div>
            </div>

            <div class="circular-button button-col-1" data-col="1">
                <img class="arrow" src="https://github.com/user-attachments/assets/3d54aed8-48bc-41ee-8f7e-546d783009a5">
                <div class="circular-button-item"></div>
            </div>

            <div class="circular-button button-col-6-1" data-col="6">
                <div class="circular-button-item" id="current-num">01</div>
            </div>

            <div class="circular-button button-col-6-2" data-col="6">
                <div class="circular-button-item" id="total-num">10</div>
            </div>

            <div class="circular-button button-col-11-1" data-col="11">
                <img class="arrow" src="https://github.com/user-attachments/assets/1ef37b01-a480-40d9-8193-b0b538252e38">
                <div class="circular-button-item"></div>
            </div>
            <div class="circular-button button-col-11-2" data-col="11">
                <img class="arrow" src="https://github.com/user-attachments/assets/8f184659-fe32-49c8-90e2-6e3245f04ed6">
                <div class="circular-button-item"></div>
            </div>

        </main>

        <section class="grid-row row-4">
            <div class="text-cell cell-4-1">selected works</div>
            <div class="text-cell cell-4-2">category</div>
            <div class="text-cell cell-4-3">year</div>
            <div class="text-cell cell-4-9 description-label">description</div>
        </section>

        <div class="grid-cell row-5-cell"></div>

    </div>

    <div id="menu-overlay" class="menu-overlay">
        <div class="menu-content">
            <div id="menu-close-btn" class="menu-close">×</div>
            <div id="menu-project-list" class="menu-project-list">
                </div>
        </div>
    </div>

    <script src="/js/script.js"></script>
</body>

</html>
